<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal PM - Plan, Manage, Deliver</title>
  <meta name="description" content="Jadwal PM browser-based static MVP for engineering project management.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><span class="bar bar-1">JAD</span><span class="bar bar-2">W</span><span class="bar bar-3">AL</span></div>
        <div class="brand-copy"><h1>Jadwal PM</h1><p>Plan &bull; Manage &bull; Deliver</p></div>
      </div>
      <div class="workspace-switcher"><span class="workspace-avatar">PM</span><div><strong>Engineering PMO</strong><small id="workspaceCount">0 active projects</small></div></div>
      <nav class="nav-list" id="navList" aria-label="Workspace modules"></nav>
      <div class="sidebar-insight"><span class="insight-label">Portfolio Health</span><strong id="portfolioHealth">0%</strong><div class="mini-meter"><span id="portfolioHealthBar"></span></div><p id="portfolioInsight">Create your first project to start tracking delivery.</p></div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div class="project-select"><span class="field-label">Current Project</span><select id="projectSelector" aria-label="Current project selector"></select></div>
        <label class="search-box" for="searchInput"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/></svg><input id="searchInput" type="search" placeholder="Search projects, RFIs, submittals, files..."><kbd>Ctrl K</kbd></label>
        <div class="header-actions">
          <button class="date-chip" type="button" id="todayChip">Today</button>
          <button class="icon-button" type="button" aria-label="Notifications"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M15 17H9m9-6a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7Zm-4.2 10a2 2 0 0 1-3.6 0"/></svg><span class="badge" id="notificationBadge">0</span></button>
          <button class="language-toggle" id="languageToggle" type="button">RTL</button>
          <div class="profile"><span>YA</span><div><strong>Yousef Alahmari</strong><small>Project Director</small></div></div>
        </div>
      </header>
      <main class="dashboard" id="appMain"></main>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-head"><div><span class="breadcrumb">Jadwal PM</span><h2 id="modalTitle">Form</h2></div><button class="icon-button" type="button" id="modalClose" aria-label="Close">×</button></header>
      <form id="modalForm" class="modal-form"></form>
    </section>
  </div>
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <script src="./app.js"></script>
  <script>
    document.addEventListener("click", function (event) {
      if (event.target.closest('[data-action="closeModal"]')) {
        document.getElementById("modalBackdrop").hidden = true;
      }
    });
  </script>
</body>
</html>
